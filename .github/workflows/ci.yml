name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — lint, typecheck, tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src --max-warnings 0

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        run: npm test

      - name: Production build
        run: npm run build

  contracts:
    name: Contracts — cargo tests + wasm build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        contract: [counter, donation]
    defaults:
      run:
        working-directory: contracts/${{ matrix.contract }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts/${{ matrix.contract }}

      - name: Unit tests
        run: cargo test --locked

      - name: Build WASM
        run: cargo build --target wasm32v1-none --release --locked
